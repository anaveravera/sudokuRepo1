image: php:8.2

pipelines:
  branches:
    main:
      - step:
          name: Build and Test
          caches:
            - composer
          script:
            - apt-get update && apt-get install -y git unzip
            - php -v
            - curl -sS https://getcomposer.org/installer | php
            - php composer.phar install
            - php vendor/bin/phpunit
      - step:
          name: Deploy Staging (placeholder)
          deployment: staging
          script:
            - echo "Deploy to staging here (Vercel/Render API or SSH)."
  pull-requests:
    '**':
      - step:
          name: PR Validation
          caches:
            - composer
          script:
            - apt-get update && apt-get install -y git unzip
            - curl -sS https://getcomposer.org/installer | php
            - php composer.phar install
            - php vendor/bin/phpunit
